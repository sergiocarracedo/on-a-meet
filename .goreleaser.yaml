version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    tags:
      - netgo

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

brews:
  - name: on-a-meet
    repository:
      owner: sergiocarracedo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser
      email: goreleaser@localhost
    homepage: "https://github.com/sergiocarracedo/on-a-meet"
    description: "CLI tool to detect camera on/off state and trigger commands"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "on-a-meet"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
